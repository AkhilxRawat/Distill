name: Build Processing Service
on:
   push:
    paths:
        - 'services/processing/**'
        - 'proto/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
        - name: Checckout repository
          uses: actions/checkout@v4
        -  name: Log in to GHCR
           uses: docker/login-action@v3
           with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            file: services/processing/Dockerfile
            push: true
            tags: |
                 ghcr.io/akhilxrawat/distill-processing:${{ github.sha }}
                 ghcr.io/akhilxrawat/distill-processing:latest     