replicaCount: 1

image:
  repository: ghcr.io/akhilxrawat/distill-frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: distill.localhost
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
  tls:
    - hosts:
        - distill.localhost
      secretName: distill-frontend-tls

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 200m

env:
  NEXT_PUBLIC_API_URL: "https://distill.localhost"
