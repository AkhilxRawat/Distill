# ============================================================
# charts/vault/vault-static-secret.yaml
#
# VaultStaticSecret CRD — instructs VSO to pull a secret from
# Vault's KV-v2 engine and materialise it as a native
# Kubernetes Secret.
#
# The Kubernetes Secret "processing-secret" in distill-dev is
# already referenced by the processing service Helm chart via
# envFrom.secretRef, so no chart changes are needed.
# ============================================================
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: processing-secret-sync
  namespace: distill-dev
spec:
  # Reference the VaultAuth that grants access to Vault
  vaultAuthRef: distill-vault-auth

  # Vault KV engine type: "kv-v2" (versioned KV)
  type: kv-v2

  # Mount path of the KV-v2 engine in Vault
  mount: secret

  # Path within the mount (WITHOUT the "data/" prefix for KV-v2)
  path: distill/processing

  # Refresh interval — how often VSO polls Vault for changes
  refreshAfter: 60s

  # The destination Kubernetes Secret that VSO will create/update
  destination:
    name: processing-secret
    create: true

    # Labels added to the materialised K8s Secret
    labels:
      app: distill
      component: processing
      managed-by: vault-secrets-operator

    # Optional: transform only specific keys from Vault
    # (leave empty to sync ALL keys from the Vault secret)
    # transformation:
    #   includes:
    #     - GEMINI_API_KEY
