services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      - STORAGE_HOST=storage
      - STORAGE_PORT=50053
      - PROCESSING_HOST=processing
      - PROCESSING_PORT=50052
    depends_on:
      - mongodb
      - storage
      - processing

  processing:
    build:
      context: .
      dockerfile: services/processing/Dockerfile
    environment:
      - STORAGE_HOST=storage
      - STORAGE_PORT=50053
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb
      - storage

  storage:
    build:
      context: .
      dockerfile: services/storage/Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/distill
    depends_on:
      - mongodb

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - INGESTION_HOST=ingestion
      - INGESTION_PORT=50051
      - STORAGE_HOST=storage
      - STORAGE_PORT=50053
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - ingestion
      - storage
  
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - gateway
  
volumes:
  mongo_data: