syntax = "proto3";
package distill.ingestion.v1;
service IngestionService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
}
enum SourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_YOUTUBE_URL  = 1;
  SOURCE_TYPE_ARTICLE_URL  = 2;
  SOURCE_TYPE_RAW_TEXT     = 3;
}
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED      = 1;
  JOB_STATUS_FETCHING    = 2;
  JOB_STATUS_PROCESSING  = 3;
  JOB_STATUS_COMPLETE    = 4;
  JOB_STATUS_FAILED      = 5;
}
message SubmitJobRequest {
  string source          = 1;
  SourceType source_type = 2;
  string user_id         = 3;
}
message SubmitJobResponse {
  string job_id    = 1;
  JobStatus status = 2;
}
message GetJobStatusRequest {
  string job_id = 1;
}
message GetJobStatusResponse {
  string    job_id        = 1;
  JobStatus status        = 2;
  string    error_message = 3;
  int64     created_at    = 4;
  int64     updated_at    = 5;
}