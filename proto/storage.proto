syntax = "proto3";
package distill.storage.v1;
service StorageService {
  rpc SaveResult      (SaveResultRequest)     returns (SaveResultResponse);
  rpc GetResult       (GetResultRequest)      returns (GetResultResponse);
  rpc ListResults     (ListResultsRequest)    returns (ListResultsResponse);
  rpc UpdateJobStatus (UpdateJobStatusRequest) returns (UpdateJobStatusResponse);
}
message SaveResultRequest {
  string          job_id            = 1;
  string          user_id           = 2;
  string          source            = 3;
  string          source_type       = 4;
  string          summary           = 5;
  repeated string key_entities      = 6;
  repeated QAPair qa_pairs          = 7;
  repeated string topic_tags        = 8;
  int32           readability_score = 9;
  int32           tokens_used       = 10;
}
message SaveResultResponse  { string result_id = 1; }
message GetResultRequest    { string result_id = 1; string user_id = 2; }
message GetResultResponse   { Result result = 1; }
message ListResultsRequest  { string user_id = 1; int32 page = 2; int32 page_size 
= 3; }
message ListResultsResponse { repeated Result results = 1; int32 total = 2; }
message UpdateJobStatusRequest  { string job_id = 1; string status = 2; string 
error_message = 3; }
message UpdateJobStatusResponse { bool success = 1; }
message Result {
  string          result_id         = 1;
  string          job_id            = 2;
  string          user_id           = 3;
  string          source            = 4;
  string          source_type       = 5;
  string          summary           = 6;
  repeated string key_entities      = 7;
  repeated QAPair qa_pairs          = 8;
  repeated string topic_tags        = 9;
  int32           readability_score = 10;
  int32           tokens_used       = 11;
  int64           created_at        = 12;
}

message QAPair { string question = 1; string answer = 2; }